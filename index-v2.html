<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jovix 终端风格个人网站，具备开机动画与交互式网页命令行。" />
    <meta name="keywords" content="Jovix, 个人网站, 终端, 开发者, 软件工程师" />
    <title>Jovix // 终端主页</title>
    <link rel="icon" href="avatar.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ambient-noise" aria-hidden="true"></div>

    <main class="site-shell">
      <section class="intro-panel" aria-label="网站介绍">
        <p class="eyebrow">JOVIX // 数字工作台</p>
        <h1>终端优先的个人网站体验。</h1>
        <p class="intro-copy">
          这个网站像一台设备一样启动。按住电源键开机后，你可以通过 <code>help</code>、<code>projects</code>、<code>skills</code>
          和 <code>theme matrix</code> 等命令进行探索。
        </p>
        <div class="intro-tags" aria-label="亮点">
          <span>原生 JS</span>
          <span>CLI 交互</span>
          <span>主题切换</span>
        </div>
      </section>

      <section class="terminal-stage" aria-label="交互终端">
        <div id="terminal" style="display: none">
          <div id="terminal-header">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="title"></span>
          </div>
          <div id="terminal-body"></div>
        </div>

        <div id="power-button-area">
          <button id="power-on-btn" aria-label="开机">
            <svg id="power-button-light-strip-svg" viewBox="0 0 72 72">
              <circle id="power-button-light-strip-circle" cx="36" cy="36" r="33.75" />
            </svg>
            <svg
              id="power-button-icon-svg"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path
                d="M12.0001 2.00004C13.1009 2.00004 14.043 2.89938 14.1098 3.99396L14.1112 4.22738V10.7727C14.1112 11.8778 13.212 12.7727 12.107 12.7727C11.0018 12.7727 10.1068 11.8829 10.1025 10.7871L10.1024 10.7727V4.22738C10.1024 3.12231 10.9975 2.22738 12.1026 2.22738L12.0001 2.00004ZM12.0001 0.0000446963C6.47726 0.0000446963 2.00012 4.47718 2.00012 10C2.00012 15.5229 6.47726 20 12.0001 20C17.523 20 22.0001 15.5229 22.0001 10C22.0001 4.47718 17.523 0.0000446963 12.0001 0.0000446963ZM12.0001 18C7.58185 18 4.00012 14.4183 4.00012 10C4.00012 5.58176 7.58185 2.00004 12.0001 2.00004C16.4184 2.00004 20.0001 5.58176 20.0001 10C20.0001 14.4183 16.4184 18 12.0001 18Z"
              />
            </svg>
          </button>
          <div id="power-on-prompt">按住开机</div>
        </div>
      </section>

      <aside class="status-panel" aria-label="快速命令提示">
        <p class="status-title">快速开始</p>
        <p class="status-copy">开机后可先试试：</p>
        <div class="status-list">
          <div><code>help</code> 查看全部命令</div>
          <div><code>whoami</code> 查看个人信息</div>
          <div><code>projects</code> 查看精选项目</div>
          <div><code>theme gruvbox</code> 切换主题外观</div>
        </div>
      </aside>
    </main>

    <footer id="developer-info">
      由 Jovix 开发，Google Gemini 协助。 |
      <a href="https://1step.dev" target="_blank" class="footer-link">我的博客</a>
    </footer>

    <script type="module" src="main.js"></script>
    <script defer src="https://analytics.1step.dev/tracker.min.js" data-website-id="1step.dev"></script>
  </body>
</html>
